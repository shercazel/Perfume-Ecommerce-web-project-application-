<section class="collection-list">
    <h1>{{ title }}</h1>

    <div class="product-grid">
        <div class="card" *ngFor="let product of paginatedProducts">
            <span class="badge">{{product.discountRate ?? 0 | percent}} OFF</span>
            <span class="heart"><i class="fa-solid fa-heart"></i></span>

            <div class="img-box">
                <img [src]="product.imagePath" [alt]="product.perfName">
            </div>

            <div class="info">
                <h4>{{product.perfName}}</h4>
                <p>{{product.description}}</p>
                <p>{{product.size}}</p>
                <div class="price">
                    <span class="new">{{product.price | currency: 'PHP'}}</span>
                    <span class="old">{{product.originalPrice | currency: 'PHP'}}</span>
                </div>
                <button class="cart-btn" type="button" (click)="addToCart(product)">
                    <i class="fa-solid fa-cart-shopping"></i> Add to Cart
                </button>
            </div>
        </div>
    </div>

    <div class="pagination">
        <button type="button" [disabled]="currentPage === 1" (click)="previousPage()">&lsaquo;</button>

        <button
            *ngFor="let page of pages"
            type="button"
            [class.active]="page === currentPage"
            (click)="goToPage(page)"
        >
            {{ page }}
        </button>

        <button type="button" [disabled]="currentPage === totalPages" (click)="nextPage()">&rsaquo;</button>
    </div>
</section>
