<section class="collection-page">

    <div class="hero-collection">
        <p>kupal ka</p>
    </div>

    <div class="top-bar">
        <nav class="category-drawer-control" [class.open]="isDrawerOpen" aria-label="Collection categories">
            @for (category of categories; track category.path) {

            @if (category.path === '/collection') {
            <a [routerLink]="category.path" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
                (click)="toggleDrawer($event)">
                <span>Categories</span>
                <i class="fa-solid fa-angles-right" aria-hidden="true"></i>
            </a>
            }

            @if (category.path !== '/collection') {
            <a [routerLink]="category.path" routerLinkActive="active">
                <i class="fa-solid fa-circle" aria-hidden="true"></i>
                <span>{{ category.label }}</span>
            </a>
            }

            }
        </nav>
    </div>

    <router-outlet></router-outlet>

</section>
