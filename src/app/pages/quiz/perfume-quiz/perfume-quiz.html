<div class="question-container">

    <p class="question-number">
        {{qContent[0].questionNumber}}
    </p>

    <h1 class="question-title">
        {{qContent[0].questionTitle}}
    </h1>

    <div class="choices-grid">

        <div class="choice-card">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200&auto=format&fit=crop"
                alt="">

            <div class="choice-text">
                Natural & Fresh
            </div>
        </div>

        <div class="choice-card">
            <img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15?q=80&w=1200&auto=format&fit=crop"
                alt="">

            <div class="choice-text">
                Soft & Gentle
            </div>
        </div>

        <div class="choice-card">
            <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=1200&auto=format&fit=crop"
                alt="">

            <div class="choice-text">
                Bold & Intense
            </div>
        </div>

        <div class="choice-card">
            <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1200&auto=format&fit=crop"
                alt="">

            <div class="choice-text">
                Warm & Familiar
            </div>
        </div>

    </div>

    <div class="button-group">

        <button class="btn">
            PREVIOUS
        </button>

        <button class="btn">
            NEXT
        </button>

    </div>

</div>
