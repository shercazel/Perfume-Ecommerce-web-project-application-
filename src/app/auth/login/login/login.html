<section class="login-section hero-section">

  <div class="hero-container login-container">

    <!-- LEFT HERO TEXT -->
    <div class="hero-content login-hero">

      <div class="hero-badge">
        <span class="badge1">Secure Access</span>
        <span class="badge2">System Login Portal</span>
      </div>

      <h1 class="hero-heading">
        Welcome Back <span>Explorer</span>
      </h1>

      <p class="hero-description">
        Login to continue accessing your dashboard, records, and system features.
      </p>

    </div>

    <!-- RIGHT LOGIN CARD -->
    <div class="login-box">

      <h2 class="login-title">Sign In</h2>
      <p class="login-sub">Enter your credentials</p>

      <form>
        <label>Email</label>
        <input type="email" placeholder="you@example.com">

        <label>Password</label>
        <input type="password" placeholder="••••••••">

        <button class="btn-primary" type="submit">
          <span class="heroBtnA">Login</span>
          <span class="heroBtnB">Enter System <i>→</i></span>
        </button>
      </form>

      <div class="login-footer">
        Forgot password?
      </div>

    </div>

  </div>

</section>
